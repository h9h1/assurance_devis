[www]
user  = www-data
group = www-data

listen = 0.0.0.0:9000

; Gestion des processus
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 10
pm.max_requests      = 500

; Logs
access.log           = /proc/self/fd/2
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Timeouts
request_terminate_timeout = 60
